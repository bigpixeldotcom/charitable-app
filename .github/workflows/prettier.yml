name: Prettier

on:
  push:
    branches: [main]
    paths-ignore:
      - "package-lock.json"
      - "**/package-lock.json"
      - "yarn.lock"
      - "**/yarn.lock"
      - "pnpm-lock.yaml"
      - "**/pnpm-lock.yaml"
      - "AGENTS.md"
      - "**/AGENTS.md"
      - "CLAUDE.md"
      - "**/CLAUDE.md"
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  run:
    name: Can the code be prettier? 🤔
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version: lts/*

      - run: pnpm install --no-frozen-lockfile
      - run: ${{ github.event_name == 'pull_request' && 'pnpm exec prettier --check .' || 'pnpm run format' }}

      - uses: actions/create-github-app-token@v3
        if: github.event_name == 'push'
        id: generate-token
        with:
          client-id: ${{ vars.CHARITABLE_APP_CLIENT_ID }}
          private-key: ${{ secrets.CHARITABLE_APP_PRIVATE_KEY }}
          owner: bigpixeldotcom
          repositories: charitable-app
          permission-contents: write
          permission-pull-requests: write
      - uses: peter-evans/create-pull-request@v8
        if: github.event_name == 'push'
        with:
          body: I ran `pnpm format` 🧑‍💻
          branch: actions/prettier
          commit-message: "chore(prettier): 🤖 ✨"
          labels: 🤖 bot
          sign-commits: true
          title: "chore(prettier): 🤖 ✨"
          token: ${{ steps.generate-token.outputs.token }}
