name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  pull_request_target:
    branches: [main]
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11.1.2
      - uses: actions/setup-node@v6
        with:
          cache: "pnpm"
          node-version: "lts/*"
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run type-check
